name: Build and release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # 💡 Upgraded: Now asks you what version you want to build!
    inputs:
      release_version:
        description: 'New Version Tag (e.g., v1.0.1)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake ninja-build g++ debhelper dh-make devscripts
        
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
        
      - name: Build
        run: cmake --build build
        
      - name: Package portable tarball
        run: |
          mkdir -p dist/bin
          install -m 0755 build/powerls dist/bin/powerls
          tar -czf powerls-linux-x86_64.tar.gz -C dist .
          
      - name: Package Debian package
        run: |
          dpkg-buildpackage -us -uc -b
          cp ../*.deb .
          
      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          # 💡 DYNAMIC FIX: Uses your manual input version, or automatically grabs the Git Tag!
          tag_name: ${{ github.event.inputs.release_version || github.ref_name }}
          files: |
            powerls-linux-x86_64.tar.gz
            *.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          # 💡 Pass the dynamic version down to the AUR commit message
          RELEASE_TAG: ${{ github.event.inputs.release_version || github.ref_name }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts
          eval $(ssh-agent -s)
          echo "$AUR_SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
          
          git clone ssh://aur@aur.archlinux.org/powerls.git aur-publish-dir
          cd aur-publish-dir
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          cp ../packaging/arch/powerls/PKGBUILD .
          cp ../packaging/arch/powerls/.SRCINFO .
          
          git add PKGBUILD .SRCINFO
          
          if ! git diff-index --quiet HEAD; then
            git commit -m "ci: automated deployment sync for version $RELEASE_TAG"
            git push origin master
          fi